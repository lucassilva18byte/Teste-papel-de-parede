<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
    <title>Dark Fantasy Animated Wallpaper - Advanced</title>
      <style>
          body, html {
                margin: 0;
                      padding: 0;
                            height: 100%;
                                  overflow: hidden;
                                        background: #0a0015;
                                              font-family: 'Arial', sans-serif;
                                                  }
                                                      canvas {
                                                            display: block;
                                                                }
                                                                    #ui {
                                                                          position: absolute;
                                                                                bottom: 20px;
                                                                                      left: 20px;
                                                                                            color: #aa88ff;
                                                                                                  font-size: 14px;
                                                                                                        pointer-events: none;
                                                                                                              text-shadow: 0 0 6px #000;
                                                                                                                  }
                                                                                                                    </style>
                                                                                                                    </head>
                                                                                                                    <body>

                                                                                                                    <canvas id="c"></canvas>
                                                                                                                    <div id="ui">Dark Fantasy Scene Avançada • Princesa, Cavaleiro & Dragão</div>

                                                                                                                    <script>
                                                                                                                    // =============================================
                                                                                                                    // Configurações e Utilitários
                                                                                                                    // =============================================
                                                                                                                    const canvas = document.getElementById('c');
                                                                                                                    const ctx = canvas.getContext('2d', { alpha: false });

                                                                                                                    let w, h;
                                                                                                                    function resize() {
                                                                                                                      w = canvas.width = window.innerWidth;
                                                                                                                        h = canvas.height = window.innerHeight;
                                                                                                                        }
                                                                                                                        window.addEventListener('resize', resize);
                                                                                                                        resize();

                                                                                                                        // Simples Perlin noise para movimentos orgânicos (baseado em algoritmo clássico)
                                                                                                                        let noiseSeed = Math.random() * 1000;
                                                                                                                        function noise(x, y) {
                                                                                                                          const n = Math.sin(x * 12.9898 + y * 78.233 + noiseSeed) * 43758.5453;
                                                                                                                            return n - Math.floor(n);
                                                                                                                            }

                                                                                                                            // Classe para Partículas (névoa, chuva, magia)
                                                                                                                            class Particle {
                                                                                                                              constructor(opts) {
                                                                                                                                  this.x = opts.x || Math.random() * w;
                                                                                                                                      this.y = opts.y || Math.random() * h;
                                                                                                                                          this.size = opts.size || 10;
                                                                                                                                              this.speedX = opts.speedX || 0;
                                                                                                                                                  this.speedY = opts.speedY || 1;
                                                                                                                                                      this.color = opts.color || '#332255';
                                                                                                                                                          this.alpha = opts.alpha || 0.3;
                                                                                                                                                              this.life = opts.life || Infinity;
                                                                                                                                                                  this.noiseScale = opts.noiseScale || 0.005;
                                                                                                                                                                    }
                                                                                                                                                                      update() {
                                                                                                                                                                          this.x += this.speedX + (noise(this.x * this.noiseScale, this.y * this.noiseScale) - 0.5) * 2;
                                                                                                                                                                              this.y += this.speedY;
                                                                                                                                                                                  if (this.y > h + this.size || this.y < -this.size || this.x < -this.size || this.x > w + this.size) {
                                                                                                                                                                                        this.reset();
                                                                                                                                                                                            }
                                                                                                                                                                                                this.life--;
                                                                                                                                                                                                  }
                                                                                                                                                                                                    draw() {
                                                                                                                                                                                                        ctx.globalAlpha = this.alpha;
                                                                                                                                                                                                            ctx.fillStyle = this.color;
                                                                                                                                                                                                                ctx.beginPath();
                                                                                                                                                                                                                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                                                                                                                                                                                                                        ctx.fill();
                                                                                                                                                                                                                          }
                                                                                                                                                                                                                            reset() {
                                                                                                                                                                                                                                this.x = Math.random() * w;
                                                                                                                                                                                                                                    this.y = -this.size;
                                                                                                                                                                                                                                        this.life = Infinity;
                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                          // Inicializar partículas
                                                                                                                                                                                                                                          const mistParticles = [];
                                                                                                                                                                                                                                          for (let i = 0; i < 100; i++) {
                                                                                                                                                                                                                                            mistParticles.push(new Particle({
                                                                                                                                                                                                                                                size: Math.random() * 30 + 10,
                                                                                                                                                                                                                                                    speedY: -(Math.random() * 0.5 + 0.2),
                                                                                                                                                                                                                                                        alpha: Math.random() * 0.4 + 0.1,
                                                                                                                                                                                                                                                            color: '#221133',
                                                                                                                                                                                                                                                                noiseScale: 0.002
                                                                                                                                                                                                                                                                  }));
                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                  const rainParticles = [];
                                                                                                                                                                                                                                                                  for (let i = 0; i < 200; i++) {
                                                                                                                                                                                                                                                                    rainParticles.push(new Particle({
                                                                                                                                                                                                                                                                        size: Math.random() * 2 + 1,
                                                                                                                                                                                                                                                                            speedY: Math.random() * 8 + 4,
                                                                                                                                                                                                                                                                                speedX: Math.random() * 2 - 1,
                                                                                                                                                                                                                                                                                    alpha: 0.4,
                                                                                                                                                                                                                                                                                        color: '#445577',
                                                                                                                                                                                                                                                                                            noiseScale: 0.01
                                                                                                                                                                                                                                                                                              }));
                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                              const magicParticles = [];
                                                                                                                                                                                                                                                                                              for (let i = 0; i < 50; i++) {
                                                                                                                                                                                                                                                                                                magicParticles.push(new Particle({
                                                                                                                                                                                                                                                                                                    x: w * 0.62,
                                                                                                                                                                                                                                                                                                        y: h * 0.68 - 30,
                                                                                                                                                                                                                                                                                                            size: Math.random() * 4 + 2,
                                                                                                                                                                                                                                                                                                                speedX: (Math.random() - 0.5) * 3,
                                                                                                                                                                                                                                                                                                                    speedY: (Math.random() - 0.5) * 3,
                                                                                                                                                                                                                                                                                                                        alpha: Math.random() * 0.6 + 0.4,
                                                                                                                                                                                                                                                                                                                            color: '#bb99ff',
                                                                                                                                                                                                                                                                                                                                life: Math.random() * 60 + 30,
                                                                                                                                                                                                                                                                                                                                    noiseScale: 0.008
                                                                                                                                                                                                                                                                                                                                      }));
                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                      // =============================================
                                                                                                                                                                                                                                                                                                                                      // Animação principal
                                                                                                                                                                                                                                                                                                                                      // =============================================
                                                                                                                                                                                                                                                                                                                                      let time = 0;

                                                                                                                                                                                                                                                                                                                                      function draw() {
                                                                                                                                                                                                                                                                                                                                        time += 0.016;

                                                                                                                                                                                                                                                                                                                                          // Fundo gradiente + overlay de névoa
                                                                                                                                                                                                                                                                                                                                            const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
                                                                                                                                                                                                                                                                                                                                              bgGrad.addColorStop(0, '#0a0015');
                                                                                                                                                                                                                                                                                                                                                bgGrad.addColorStop(0.5, '#140033');
                                                                                                                                                                                                                                                                                                                                                  bgGrad.addColorStop(1, '#1a0044');
                                                                                                                                                                                                                                                                                                                                                    ctx.fillStyle = bgGrad;
                                                                                                                                                                                                                                                                                                                                                      ctx.fillRect(0, 0, w, h);

                                                                                                                                                                                                                                                                                                                                                        // Lua com halo pulsante
                                                                                                                                                                                                                                                                                                                                                          ctx.save();
                                                                                                                                                                                                                                                                                                                                                            const moonPulse = 0.3 + Math.sin(time * 0.4) * 0.1;
                                                                                                                                                                                                                                                                                                                                                              const moonGrad = ctx.createRadialGradient(w * 0.82, h * 0.18, 80, w * 0.82, h * 0.18, 200);
                                                                                                                                                                                                                                                                                                                                                                moonGrad.addColorStop(0, '#aa88ff');
                                                                                                                                                                                                                                                                                                                                                                  moonGrad.addColorStop(0.6, 'rgba(170,136,255,0.4)');
                                                                                                                                                                                                                                                                                                                                                                    moonGrad.addColorStop(1, 'rgba(170,136,255,0)');
                                                                                                                                                                                                                                                                                                                                                                      ctx.fillStyle = moonGrad;
                                                                                                                                                                                                                                                                                                                                                                        ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                          ctx.arc(w * 0.82, h * 0.18, 200 * moonPulse, 0, Math.PI * 2);
                                                                                                                                                                                                                                                                                                                                                                            ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                              ctx.restore();

                                                                                                                                                                                                                                                                                                                                                                                // Castelo mais detalhado
                                                                                                                                                                                                                                                                                                                                                                                  ctx.fillStyle = '#0f001a';
                                                                                                                                                                                                                                                                                                                                                                                    ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                      ctx.moveTo(w * 0.05, h); // Base esquerda
                                                                                                                                                                                                                                                                                                                                                                                        ctx.lineTo(w * 0.15, h * 0.6);
                                                                                                                                                                                                                                                                                                                                                                                          ctx.lineTo(w * 0.25, h * 0.55);
                                                                                                                                                                                                                                                                                                                                                                                            ctx.lineTo(w * 0.3, h * 0.7);
                                                                                                                                                                                                                                                                                                                                                                                              ctx.lineTo(w * 0.4, h * 0.4);
                                                                                                                                                                                                                                                                                                                                                                                                ctx.lineTo(w * 0.5, h * 0.35);
                                                                                                                                                                                                                                                                                                                                                                                                  ctx.lineTo(w * 0.6, h * 0.5);
                                                                                                                                                                                                                                                                                                                                                                                                    ctx.lineTo(w * 0.7, h * 0.3);
                                                                                                                                                                                                                                                                                                                                                                                                      ctx.lineTo(w * 0.8, h * 0.45);
                                                                                                                                                                                                                                                                                                                                                                                                        ctx.lineTo(w * 0.9, h * 0.65);
                                                                                                                                                                                                                                                                                                                                                                                                          ctx.lineTo(w * 0.95, h);
                                                                                                                                                                                                                                                                                                                                                                                                            ctx.lineTo(w * 0.05, h);
                                                                                                                                                                                                                                                                                                                                                                                                              ctx.fill();

                                                                                                                                                                                                                                                                                                                                                                                                                // Tochas no castelo (com chamas animadas)
                                                                                                                                                                                                                                                                                                                                                                                                                  const torchPositions = [w * 0.2, w * 0.45, w * 0.7];
                                                                                                                                                                                                                                                                                                                                                                                                                    torchPositions.forEach((tx, idx) => {
                                                                                                                                                                                                                                                                                                                                                                                                                        const ty = h * (0.5 + idx * 0.05);
                                                                                                                                                                                                                                                                                                                                                                                                                            // Haste da tocha
                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.fillStyle = '#331100';
                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.fillRect(tx - 4, ty - 40, 8, 40);
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                            // Chama com distorção
                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.save();
                                                                                                                                                                                                                                                                                                                                                                                                                                                    const flamePulse = Math.sin(time * 5 + idx) * 5;
                                                                                                                                                                                                                                                                                                                                                                                                                                                        const flameGrad = ctx.createRadialGradient(tx, ty - 30, 0, tx, ty - 30, 30);
                                                                                                                                                                                                                                                                                                                                                                                                                                                            flameGrad.addColorStop(0, '#ff8800');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                flameGrad.addColorStop(0.5, '#ff4400');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    flameGrad.addColorStop(1, 'rgba(255,100,0,0)');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.fillStyle = flameGrad;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.moveTo(tx - 15, ty - 10);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.quadraticCurveTo(tx + flamePulse, ty - 60, tx + 15, ty - 10);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.closePath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.restore();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Dragão voando (silhueta com asas batendo)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const dragonX = w * (0.1 + Math.sin(time * 0.2) * 0.3);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const dragonY = h * 0.25 + Math.cos(time * 0.3) * 30;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.fillStyle = '#150020';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Corpo
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.ellipse(dragonX, dragonY, 100, 30, 0, 0, Math.PI * 2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Cabeça
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.ellipse(dragonX + 90, dragonY - 10, 30, 20, Math.PI / 6, 0, Math.PI * 2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Asas (batendo com seno)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const wingFlap = Math.sin(time * 4) * 30;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.moveTo(dragonX - 20, dragonY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.quadraticCurveTo(dragonX - 100, dragonY - 50 + wingFlap, dragonX - 50, dragonY - 100 + wingFlap);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.quadraticCurveTo(dragonX - 30, dragonY - 20, dragonX - 20, dragonY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.moveTo(dragonX + 20, dragonY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.quadraticCurveTo(dragonX + 100, dragonY - 50 - wingFlap, dragonX + 50, dragonY - 100 - wingFlap);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.quadraticCurveTo(dragonX + 30, dragonY - 20, dragonX + 20, dragonY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.fill();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Névoa (mist)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.globalCompositeOperation = 'screen'; // Blend para glow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        mistParticles.forEach(p => { p.update(); p.draw(); });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.globalCompositeOperation = 'source-over';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Chuva
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              rainParticles.forEach(p => { p.update(); p.draw(); });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Cavaleiro avançado (com espada brilhante)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const knightX = w * 0.35;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const knightY = h * 0.75;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      // Capa balançando com noise
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.fillStyle = '#1a0d2e';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.moveTo(knightX + 30, knightY - 40);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const capeWind = noise(time * 0.1, 0) * 20;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.quadraticCurveTo(knightX + 80 + Math.sin(time * 4) * 12 + capeWind, knightY - 10, knightX + 50 + Math.cos(time * 3.4) * 8, knightY + 80);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.lineTo(knightX + 10, knightY + 80);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.lineTo(knightX + 20, knightY - 30);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Armadura
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.fillStyle = '#2a1a4a';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.fillRect(knightX - 20, knightY - 80, 80, 140);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.fillRect(knightX - 10, knightY - 100, 60, 40); // Elmo
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Espada com brilho
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.strokeStyle = '#88aaff';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.lineWidth = 8;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.moveTo(knightX + 50, knightY - 60);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.lineTo(knightX + 70, knightY - 120 + Math.sin(time * 2) * 5);
