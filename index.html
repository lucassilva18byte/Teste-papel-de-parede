                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.stroke();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.globalAlpha = 0.3 + Math.abs(Math.sin(time * 3)) * 0.4;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ctx.strokeStyle = '#ffffff';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.lineWidth = 12;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.stroke(); // Glow
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.globalAlpha = 1;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Princesa avançada
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const princessX = w * 0.62;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const princessY = h * 0.75;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              // Vestido esvoaçante com noise
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const dressWind = noise(time * 0.15, 1) * 15;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.fillStyle = '#4b2e66';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.moveTo(princessX, princessY - 60);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.quadraticCurveTo(princessX - 60 + Math.cos(time * 2.8) * 20 + dressWind, princessY + 20, princessX - 30, princessY + 100);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.quadraticCurveTo(princessX + 30, princessY + 100, princessX + 40 + Math.sin(time * 3.1) * 15 - dressWind, princessY - 20);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            ctx.closePath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ctx.fill();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Cabelo ondulando
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  ctx.strokeStyle = '#bb99ff';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.lineWidth = 6;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ctx.globalAlpha = 0.7;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.beginPath();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.moveTo(princessX + 10, princessY - 90);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            for (let i = 0; i < 8; i++) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const hairNoise = noise(time * 0.2 + i, 2) * 20;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ctx.quadraticCurveTo(princessX + 40 + Math.sin(time * 2 + i) * 30 + hairNoise, princessY - 60 + i * 25, princessX + 20 + Math.cos(time * 1.7 + i * 0.8) * 40, princessY - 30 + i * 30);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ctx.stroke();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ctx.globalAlpha = 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Partículas de magia
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              magicParticles.forEach((p, idx) => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  p.update();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (p.life <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            magicParticles[idx] = new Particle({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    x: princessX + (Math.random() - 0.5) * 50,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            y: princessY - 30 + (Math.random() - 0.5) * 50,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    size: Math.random() * 4 + 2,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            speedX: (Math.random() - 0.5) * 3,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    speedY: (Math.random() - 0.5) * 3,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            alpha: Math.random() * 0.6 + 0.4,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    color: '#bb99ff',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            life: Math.random() * 60 + 30,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    noiseScale: 0.008
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    p.draw();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            requestAnimationFrame(draw);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            draw();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
